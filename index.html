<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Clan Relik - Soutien Katia - Clash of Clans</title>
    <meta name="description" content="Site officiel du Clan Relik. Retrouvez tous les liens pour soutenir Katia sur YouTube et Facebook. Communauté Clash of Clans et JCCV.">
    <meta name="keywords" content="Clan Relik, Katia, Clash of Clans, JCCV, soutien, gaming, youtube katia, facebook katia">
    <meta name="author" content="Clan Relik">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Clan Relik - Site Officiel">
    <meta property="og:description" content="Soutenez Katia et rejoignez la communauté du Clan Relik !">
    <meta property="og:image" content="logo JCCV.webp">
    <meta property="og:url" content="https://clan-relik.github.io/Clan-Relik/">
    <meta charset="UTF-8">
    <title>Clan Relik x Katia - Tempête de Cendres</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            min-height: 100vh; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            overflow-x: hidden; 
            overflow-y: auto; /* Autorise le défilement si le contenu dépasse la hauteur */
            color: white;
        }

        .main-container { 
            display: flex; 
            min-height: 100vh; 
            width: 100%; 
        }

        /* --- SECTION GAUCHE : LE CLAN --- */
        .left-side {
            flex: 2; position: relative;
            background-image: url('fond.webp'); 
            background-size: cover; 
            background-position: bottom center; /* Garde le texte RELIK visible en bas */
            /* overflow: hidden a été supprimé ici, il posait problème sur mobile */
        }

        /* --- CONTENEUR DE CENDRES MASSIF --- */
        .ash-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        /* Style de base d'une cendre */
        .ash {
            position: absolute;
            top: -5vh;
            background: #ffd700;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(50px) scale(0.5); opacity: 0; }
        }

        .clan-buttons-container {
            position: absolute; bottom: 50px; /* J'ai remonté à 50px au lieu de 30px pour les versions PC */
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; width: 100%; justify-content: center;
            z-index: 10;
        }

        /* --- SECTION DROITE : KATIA --- */
        .right-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 20px; border-left: 3px solid #ff7b00;
        }

        .gold-text {
            color: #FFD700; font-weight: bold; text-transform: uppercase;
            text-align: center; text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .support-msg { font-size: 1.1em; margin: 10px 0 15px 0; }
        .follow-msg { font-size: 0.9em; margin: 15px 0 10px 0; }

        .banner-katia {
            width: 100%; max-width: 380px;
            border-radius: 8px; border: 1px solid #ff7b00;
        }

        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; width: 100%; max-width: 380px;
        }

        .logo-jccv {
            margin-top: auto; 
            width: 350px; height: auto;
            margin-bottom: 40px; /* Plus d'espace sous le logo pour ne pas le couper */
            padding-bottom: 20px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            filter: drop-shadow(0 0 10px rgba(255, 123, 0, 0.5));
        }

        /* BOUTONS */
        .btn {
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-weight: bold;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-giant { padding: 15px 30px; border-radius: 10px; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .btn-social { padding: 10px; border-radius: 6px; font-size: 10px; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .discord { background: #5865F2; }
        .relik { background: #ff7b00; }
        .twitch { background: #9146FF; }
        .yt { background: #FF0000; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .tiktok { background: #000; border: 1px solid #fff; }
        .fb { background: #1877F2; }

        i { margin-right: 8px; font-size: 1.2em; }

        /* --- FORMAT TABLETTE ET SMARTPHONE --- */
        @media screen and (max-width: 1100px) { /* Augmenté à 1100px pour inclure les iPad Pro et Surface Pro */
            body, html {
                overflow-y: auto;   /* Permet le défilement sur mobile */
                height: auto;
            }

            .main-container {
                flex-direction: column; /* Les blocs s'empilent verticalement */
                height: auto;
                min-height: 100vh;
            }

            .left-side {
                flex: none;
                min-height: 50vh;
                height: 55vh; /* Un peu plus grand pour l'image de fond */
                background-size: cover; 
                background-position: bottom center; /* Aligné en bas pour toujours voir "RELIK" */
                /* On active flexbox ici pour gérer la position des boutons proprement sans empiéter sur RELIK */
                display: flex; 
                flex-direction: column;
                justify-content: flex-end; 
                padding-bottom: 20px; /* Les boutons seront à 20px du bord du bas, laissant RELIK derrière */
                margin-bottom: 90px; /* On augmente encore la marge pour laisser la place aux deux boutons (+ d'espace blanc) */
                overflow: visible; /* CRITIQUE : Permet aux boutons de déborder de l'image de fond sans être coupés ! */
            }

            .right-side {
                flex: none;
                height: auto;
                border-left: none; /* On retire la bordure gauche */
                border-top: 3px solid #ff7b00; /* On la remet en haut */
                padding-bottom: 50px;
            }

            .clan-buttons-container {
                flex-direction: column; /* On empile les gros boutons */
                align-items: center;
                gap: 15px;
                position: relative; /* Retire la position absolue */
                bottom: -50px; /* Les fait descendre de 50px de leur conteneur pour créer cet écart propre avec RELIK */
                left: 0; transform: none; /* Annule les anciens forçages de l'ordinateur */
                margin-top: 0; /* Nettoyage */
            }

            .btn-giant {
                width: 80%; /* Boutons plus larges et lisibles aux doigts */
                justify-content: center;
            }

            .social-grid {
                width: 100%;
                gap: 15px; /* Les boutons de réseaux sont plus espacés */
            }

            .btn-social {
                padding: 12px;
                font-size: 13px; /* Texte des petits boutons plus gros */
            }

            .logo-jccv {
                width: 100%;
                max-width: 280px;
                margin-top: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="left-side">
            <div id="ash-box" class="ash-container"></div>

            <div class="clan-buttons-container">
                <a class="btn btn-giant discord" href="https://discord.gg/vrSWuRSptN">
                    <i class="fab fa-discord"></i>Discord Clan
                </a>
                <a class="btn btn-giant relik" href="https://link.clashofclans.com/fr?action=OpenClanProfile&tag=QVYL0YV">
                    <i class="fas fa-shield-alt"></i>RDV chez Relik
                </a>
            </div>
        </div>

        <div class="right-side">
            <div class="gold-text support-msg">Relik soutient la streameuse Katia</div>
            <img src="banniere youtube.webp" class="banner-katia">
            <div class="gold-text follow-msg">Suivez Katia sur ces réseaux</div>
            <div class="social-grid">
                <a class="btn btn-social insta" href="https://www.instagram.com/katwom3n/"><i class="fab fa-instagram"></i>Instagram</a>
                <a class="btn btn-social tiktok" href="https://vm.tiktok.com/ZM8X4xSgT/"><i class="fab fa-tiktok"></i>TikTok</a>
                <a class="btn btn-social twitch" href="https://www.twitch.tv/jiraiclasherchezvous"><i class="fab fa-twitch"></i>Twitch</a>
                <a class="btn btn-social fb" href="https://www.facebook.com/Jiraiclasherchezvous"><i class="fab fa-facebook-f"></i>Facebook</a>
                <a class="btn btn-social yt" href="https://www.youtube.com/channel/UC6posKs3z9GKfuW0QV7_nsg"><i class="fab fa-youtube"></i>YouTube</a>
                <a class="btn btn-social discord" href="https://discord.gg/vHtv7jyUys"><i class="fab fa-discord"></i>Discord Katia</a>
            </div>
            <img src="logo JCCV.webp" class="logo-jccv">
        </div>

    </div>

    <script>
        // Petit script pour créer 60 cendres sans surcharger le code HTML
        const ashBox = document.getElementById('ash-box');
        const colors = ['#ffd700', '#ffae00', '#ff8000', '#ff4500', '#ffdb58'];

        for (let i = 0; i < 60; i++) {
            const ash = document.createElement('div');
            ash.className = 'ash';
            
            // Taille aléatoire (entre 2 et 5px)
            const size = Math.random() * 3 + 2;
            ash.style.width = size + 'px';
            ash.style.height = size + 'px';
            
            // Position horizontale aléatoire (0 à 100%)
            ash.style.left = Math.random() * 100 + '%';
            
            // Vitesse aléatoire (entre 4 et 10 secondes)
            ash.style.animationDuration = (Math.random() * 6 + 4) + 's';
            
            // Délai aléatoire pour que ça ne tombe pas tout en même temps
            ash.style.animationDelay = (Math.random() * 8) + 's';
            
            // Couleur aléatoire piochée dans notre liste chaude
            ash.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            ashBox.appendChild(ash);
        }
    </script>

</body>

</html>
