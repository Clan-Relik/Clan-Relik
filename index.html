<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Relik - Soutien Katia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- BASE COMMUNE (PC PAR DÉFAUT) --- */
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; color: white;
            overflow: hidden;
        }
        .main-container { display: flex; height: 100vh; width: 100vw; }
        .left-side {
            flex: 1.5; position: relative;
            background: url('fond.webp') no-repeat center top; 
            background-size: cover;
            display: flex; flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 30px;
        }
        .right-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 20px; border-left: 3px solid #ff7b00;
            justify-content: space-around;
        }
        .clan-buttons-container { display: flex; gap: 15px; width: 100%; justify-content: center; z-index: 10; position: relative; }
        .btn-giant { width: 40%; padding: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; border-radius: 8px; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; }

        /* --- STYLES SOCIAUX --- */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 350px; }
        .btn-social { padding: 10px; border-radius: 6px; font-size: 10px; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; text-transform: uppercase; font-weight: bold; }
        .discord { background: #5865F2; } .relik { background: #ff7b00; } .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #FF0000; } .fb { background: #1877F2; } .twitch { background: #9146FF; } .tiktok { background: #000; border: 1px solid #fff; }
        .gold-text { color: #FFD700; font-weight: bold; text-transform: uppercase; text-align: center; }
        .banner-katia { width: 90%; max-width: 320px; border-radius: 8px; border: 1px solid #ff7b00; }
        .logo-jccv { width: 60%; max-width: 180px; }

        /* =============================================
           1. ZONE SPÉCIFIQUE PORTABLE (Max 480px)
           ============================================= */
        @media screen and (max-width: 480px) {
            .main-container { flex-direction: column; height: auto; }
            body { overflow-y: auto; }
            .left-side { height: 55vh; min-height: 320px; padding-bottom: 10px; }
            .right-side { border-left: none; border-top: 3px solid #ff7b00; padding: 25px 10px; gap: 15px; }
            .clan-buttons-container { margin-top: 5px; gap: 8px; }
            .btn-giant { width: 46%; font-size: 9px; padding: 10px 5px; }
            /* Mode Paysage Portable */
            @media (orientation: landscape) {
                .main-container { flex-direction: row; height: 100vh; }
                .clan-buttons-container { position: absolute; bottom: 10px; justify-content: space-between; }
                .btn-giant { width: 30%; border-radius: 0 8px 8px 0; }
                .btn-giant.relik { border-radius: 8px 0 0 8px; }
            }
        }

        /* =============================================
           2. ZONE SPÉCIFIQUE TABLETTE (481px à 1024px)
           ============================================= */
        @media screen and (min-width: 481px) and (max-width: 1024px) {
            /* Tablette Portrait */
            @media (orientation: portrait) {
                .main-container { flex-direction: column; height: auto; }
                body { overflow-y: auto; }
                .left-side { height: 60vh; min-height: 450px; }
                .clan-buttons-container { margin-top: 40px; padding-bottom: 20px; } /* Grosse marge pour RELIK */
                .btn-giant { width: 45%; font-size: 11px; }
                .right-side { border-left: none; border-top: 3px solid #ff7b00; padding: 40px 10px; }
            }
            /* Tablette Paysage */
            @media (orientation: landscape) {
                .main-container { flex-direction: row; height: 100vh; }
                .clan-buttons-container { position: absolute; bottom: 20px; width: 100%; justify-content: space-between; }
                .btn-giant { width: 32%; }
            }
        }

        /* --- ANIMATION CENDRES --- */
        .ash-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .ash { position: absolute; top: -5vh; border-radius: 50%; opacity: 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 0; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-side">
            <div id="ash-box" class="ash-container"></div>
            <div class="clan-buttons-container">
                <a class="btn-giant discord" href="https://discord.gg/vrSWuRSptN"><i class="fab fa-discord"></i>&nbsp;Discord Clan</a>
                <a class="btn-giant relik" href="https://link.clashofclans.com/fr?action=OpenClanProfile&tag=QVYL0YV"><i class="fas fa-shield-alt"></i>&nbsp;RDV chez Relik</a>
            </div>
        </div>
        <div class="right-side">
            <div class="gold-text">Relik soutient Katia</div>
            <img src="banniere youtube.webp" class="banner-katia">
            <div class="social-grid">
                <a class="btn-social insta" href="https://www.instagram.com/katwom3n/"><i class="fab fa-instagram"></i>&nbsp;Instagram</a>
                <a class="btn-social tiktok" href="https://vm.tiktok.com/ZM8X4xSgT/"><i class="fab fa-tiktok"></i>&nbsp;TikTok</a>
                <a class="btn-social twitch" href="https://www.twitch.tv/jiraiclasherchezvous"><i class="fab fa-twitch"></i>&nbsp;Twitch</a>
                <a class="btn-social fb" href="https://www.facebook.com/Jiraiclasherchezvous"><i class="fab fa-facebook-f"></i>&nbsp;Facebook</a>
                <a class="btn-social yt" href="https://www.youtube.com/channel/UC6posKs3z9GKfuW0QV7_nsg"><i class="fab fa-youtube"></i>&nbsp;YouTube</a>
                <a class="btn-social discord" href="https://discord.gg/vHtv7jyUys"><i class="fab fa-discord"></i>&nbsp;Discord Katia</a>
            </div>
            <img src="logo JCCV.webp" class="logo-jccv">
        </div>
    </div>
    <script>
        const ashBox = document.getElementById('ash-box');
        const colors = ['#ffd700', '#ffae00', '#ff8000', '#ff4500'];
        for (let i = 0; i < 30; i++) {
            const ash = document.createElement('div');
            ash.className = 'ash';
            const size = Math.random() * 2 + 2;
            ash.style.width = size + 'px'; ash.style.height = size + 'px';
            ash.style.left = Math.random() * 100 + '%';
            ash.style.animationDuration = (Math.random() * 5 + 4) + 's';
            ash.style.animationDelay = (Math.random() * 5) + 's';
            ash.style.background = colors[Math.floor(Math.random() * colors.length)];
            ashBox.appendChild(ash);
        }
    </script>
</body>
</html>
