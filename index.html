<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Relik - Soutien Katia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            min-height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; color: white;
            overflow-x: hidden;
        }

        .main-container { 
            display: flex; 
            min-height: 100vh; 
            width: 100vw; 
        }

        /* --- SECTION GAUCHE --- */
        .left-side {
            flex: 2; position: relative;
            background: url('fond.webp') no-repeat center center; 
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pousse les boutons vers le bas */
            padding-bottom: 40px;
            min-height: 500px;
        }

        .ash-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        .ash {
            position: absolute; top: -5vh;
            border-radius: 50%; filter: blur(1px);
            opacity: 0; animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(50px) scale(0.5); opacity: 0; }
        }

        .clan-buttons-container {
            display: flex; gap: 15px; width: 100%; justify-content: center;
            z-index: 10; position: relative; /* Plus d'absolute ici */
        }

        /* --- SECTION DROITE --- */
        .right-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 20px; border-left: 3px solid #ff7b00;
        }

        .gold-text { color: #FFD700; font-weight: bold; text-transform: uppercase; text-align: center; }
        .support-msg { font-size: 1.1em; margin: 10px 0; }
        .banner-katia { width: 100%; max-width: 380px; border-radius: 8px; border: 1px solid #ff7b00; height: auto; }
        
        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; width: 100%; max-width: 380px; margin-top: 15px;
        }

        .logo-jccv { width: 100%; max-width: 280px; height: auto; margin-top: auto; padding: 20px 0; }

        .btn {
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-weight: bold;
            text-transform: uppercase; transition: 0.2s; font-size: 12px;
        }
        .btn-giant { padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-social { padding: 10px; border-radius: 6px; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .discord { background: #5865F2; }
        .relik { background: #ff7b00; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #FF0000; }
        .fb { background: #1877F2; }
        .twitch { background: #9146FF; }
        .tiktok { background: #000; border: 1px solid #fff; }

        /* --- ADAPTATION MOBILE --- */
        @media (max-width: 850px) {
            .main-container { flex-direction: column; }
            .left-side { height: 70vh; min-height: 400px; }
            .right-side { border-left: none; border-top: 3px solid #ff7b00; }
            .clan-buttons-container { flex-direction: column; align-items: center; padding-bottom: 20px; }
            .btn-giant { width: 85%; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-side">
            <div id="ash-box" class="ash-container"></div>
            <div class="clan-buttons-container">
                <a class="btn btn-giant discord" href="https://discord.gg/vrSWuRSptN"><i class="fab fa-discord"></i>Discord Clan</a>
                <a class="btn btn-giant relik" href="https://link.clashofclans.com/fr?action=OpenClanProfile&tag=QVYL0YV"><i class="fas fa-shield-alt"></i>RDV chez Relik</a>
            </div>
        </div>
        <div class="right-side">
            <div class="gold-text support-msg">Relik soutient Katia</div>
            <img src="banniere youtube.webp" class="banner-katia">
            <div class="social-grid">
                <a class="btn btn-social insta" href="https://www.instagram.com/katwom3n/"><i class="fab fa-instagram"></i>Insta</a>
                <a class="btn btn-social tiktok" href="https://vm.tiktok.com/ZM8X4xSgT/"><i class="fab fa-tiktok"></i>TikTok</a>
                <a class="btn btn-social twitch" href="https://www.twitch.tv/jiraiclasherchezvous"><i class="fab fa-twitch"></i>Twitch</a>
                <a class="btn btn-social fb" href="https://www.facebook.com/Jiraiclasherchezvous"><i class="fab fa-facebook-f"></i>FB</a>
                <a class="btn btn-social yt" href="https://www.youtube.com/channel/UC6posKs3z9GKfuW0QV7_nsg"><i class="fab fa-youtube"></i>YouTube</a>
                <a class="btn btn-social discord" href="https://discord.gg/vHtv7jyUys"><i class="fab fa-discord"></i>Discord</a>
            </div>
            <img src="logo JCCV.webp" class="logo-jccv">
        </div>
    </div>
    <script>
        const ashBox = document.getElementById('ash-box');
        const colors = ['#ffd700', '#ffae00', '#ff8000', '#ff4500'];
        for (let i = 0; i < 50; i++) {
            const ash = document.createElement('div');
            ash.className = 'ash';
            const size = Math.random() * 3 + 2;
            ash.style.width = size + 'px'; ash.style.height = size + 'px';
            ash.style.left = Math.random() * 100 + '%';
            ash.style.animationDuration = (Math.random() * 6 + 4) + 's';
            ash.style.animationDelay = (Math.random() * 8) + 's';
            ash.style.background = colors[Math.floor(Math.random() * colors.length)];
            ashBox.appendChild(ash);
        }
    </script>
</body>
</html>
