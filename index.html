<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Relik - Soutien Katia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; color: white;
            overflow: hidden; /* Empêche le scroll parasite sur PC/Tablette */
        }

        .main-container { display: flex; height: 100vh; width: 100vw; }

        /* --- SECTION GAUCHE --- */
        .left-side {
            flex: 1.5; position: relative;
            background: url('fond.webp') no-repeat center top; /* Calé sur le haut pour le perso */
            background-size: cover;
            display: flex; flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 20px;
        }

        .ash-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        .ash {
            position: absolute; top: -5vh; border-radius: 50%; filter: blur(1px);
            opacity: 0; animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            100% { transform: translateY(110vh) translateX(50px) scale(0.5); opacity: 0; }
        }

        .clan-buttons-container {
            display: flex; gap: 10px; width: 100%; justify-content: center;
            z-index: 10; position: relative;
        }

        /* --- SECTION DROITE --- */
        .right-side {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 15px; border-left: 3px solid #ff7b00;
            justify-content: space-between;
        }

        .gold-text { color: #FFD700; font-weight: bold; text-transform: uppercase; text-align: center; font-size: 0.85em; }
        .banner-katia { width: 85%; max-width: 300px; border-radius: 8px; border: 1px solid #ff7b00; height: auto; }
        
        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; width: 90%; max-width: 320px;
        }

        .logo-jccv { width: 50%; max-width: 150px; height: auto; margin-bottom: 5px; }

        .btn {
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-weight: bold;
            text-transform: uppercase; transition: 0.2s; font-size: 9px;
            padding: 8px; border-radius: 6px;
        }
        .btn-giant { width: 44%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 10px; }

        .discord { background: #5865F2; }
        .relik { background: #ff7b00; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .yt { background: #FF0000; }
        .fb { background: #1877F2; }
        .twitch { background: #9146FF; }
        .tiktok { background: #000; border: 1px solid #fff; }

        /* --- ADAPTATION MOBILE / TABLETTE --- */
        @media (max-width: 1024px) {
            
            /* MODE PORTRAIT (Vertical) */
            @media (orientation: portrait) {
                .main-container { flex-direction: column; height: auto; }
                body { overflow-y: auto; }
                .left-side { height: 60vh; min-height: 350px; }
                .right-side { border-left: none; border-top: 3px solid #ff7b00; padding: 30px 10px; gap: 20px; }
                .clan-buttons-container { margin-top: 10px; }
                .btn-giant { width: 47%; }
            }

            /* MODE LANDSCAPE (Horizontal) */
            @media (orientation: landscape) {
                .main-container { flex-direction: row; height: 100vh; }
                .left-side { flex: 1.2; }
                .right-side { flex: 1; padding: 5px; }
                .clan-buttons-container {
                    position: absolute; bottom: 15px; width: 100%;
                    justify-content: space-between; padding: 0;
                }
                .btn-giant { width: 33%; font-size: 8px; border-radius: 0 8px 8px 0; }
                .btn-giant.relik { border-radius: 8px 0 0 8px; }
                .banner-katia { max-width: 180px; }
                .social-grid { gap: 4px; }
                .logo-jccv { max-width: 100px; }
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-side">
            <div id="ash-box" class="ash-container"></div>
            <div class="clan-buttons-container">
                <a class="btn btn-giant discord" href="https://discord.gg/vrSWuRSptN"><i class="fab fa-discord"></i>Discord Clan</a>
                <a class="btn btn-giant relik" href="https://link.clashofclans.com/fr?action=OpenClanProfile&tag=QVYL0YV"><i class="fas fa-shield-alt"></i>RDV chez Relik</a>
            </div>
        </div>
        <div class="right-side">
            <div class="gold-text">Relik soutient Katia</div>
            <img src="banniere youtube.webp" class="banner-katia">
            <div class="social-grid">
                <a class="btn btn-social insta" href="https://www.instagram.com/katwom3n/"><i class="fab fa-instagram"></i>Instagram</a>
                <a class="btn btn-social tiktok" href="https://vm.tiktok.com/ZM8X4xSgT/"><i class="fab fa-tiktok"></i>TikTok</a>
                <a class="btn btn-social twitch" href="https://www.twitch.tv/jiraiclasherchezvous"><i class="fab fa-twitch"></i>Twitch</a>
                <a class="btn btn-social fb" href="https://www.facebook.com/Jiraiclasherchezvous"><i class="fab fa-facebook-f"></i>Facebook</a>
                <a class="btn btn-social yt" href="https://www.youtube.com/channel/UC6posKs3z9GKfuW0QV7_nsg"><i class="fab fa-youtube"></i>YouTube</a>
                <a class="btn btn-social discord" href="https://discord.gg/vHtv7jyUys"><i class="fab fa-discord"></i>Discord Katia</a>
            </div>
            <img src="logo JCCV.webp" class="logo-jccv">
        </div>
    </div>
    <script>
        const ashBox = document.getElementById('ash-box');
        const colors = ['#ffd700', '#ffae00', '#ff8000', '#ff4500'];
        for (let i = 0; i < 30; i++) {
            const ash = document.createElement('div');
            ash.className = 'ash';
            const size = Math.random() * 2 + 2;
            ash.style.width = size + 'px'; ash.style.height = size + 'px';
            ash.style.left = Math.random() * 100 + '%';
            ash.style.animationDuration = (Math.random() * 5 + 4) + 's';
            ash.style.animationDelay = (Math.random() * 5) + 's';
            ash.style.background = colors[Math.floor(Math.random() * colors.length)];
            ashBox.appendChild(ash);
        }
    </script>
</body>
</html>
